---
# Equivalent of `include_recipe 'yum-epel::default' if platform_family?('rhel')`
# from the chef-linux-base-recipe. EPEL ships extra base packages on RHEL-family
# systems.
- name: Install epel-release on RHEL family
  ansible.builtin.package:
    name: epel-release
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
